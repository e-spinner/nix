console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    foreground = 'blue'
    background = 'transparent'
    template = "{{ .Path }}"

    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = '#6c6c6c'
    background = 'tranparent'
    template = '{{ .Head }}{{ if or (.Working.Changed) (.Staging.Changed)}}*{{end}} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'

    [blocks.segments.properties]
      branch_icon = ''
      commit_icon = '@'
      fetch_status = true

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    type = 'python'
    style = 'plain'
    foreground = 'green'
    background = 'transparent'
    template = '{{ .Venv }}'

    [blocks.segments.properties]
      display_mode = 'environment'
      fetch_virtual_env = true

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = 'yellow'
    background = 'transparent'
    template = '{{ .FormattedMs }}'

    [blocks.segments.properties]
      threshold = 5000


[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground_template = [
      "{{if gt .Code 0}}red{{end}}",
      "{{if ep .Code 0}}magenta{{end}}"
    ]
    background = "tranparent"
    template = "⧽"

[transient_prompt]
  foreground_template = [
    "{{if gt .Code 0}}red{{end}}",
    "{{if ep .Code 0}}magenta{{end}}"
  ]
  background = "transparent"
  template = "⧽ "


[secondary_prompt]
  foreground = 'magenta'
  background = 'transparent'
  template = ' ⧽ '
